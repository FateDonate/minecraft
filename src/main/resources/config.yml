categories:
  vip:
    title: "&6Привилегии"
    description:
      - "&7Особые роли и статусы."
    material: "DIAMOND"
    slot: 10
  kits:
    title: "&bКиты и ресурсы"
    description:
      - "&7Наборы для выживания и старта."
    material: "CHEST"
    slot: 13
  currency:
    title: "&aВалюта сервера"
    description:
      - "&7Пополнение внутриигрового счета."
    material: "EMERALD"
    slot: 16

items:
  vip_30d:
    category: "vip"
    title: "&6VIP на 30 дней"
    description:
      - "&7VIP-привилегия на 30 дней."
      - "&7Бонусные возможности сервера."
    material: "GOLD_INGOT"
    slot: 10
    price: 399
    duration-days: 30
    enabled: true
    grant-commands:
      - "lp user {player_name} parent addtemp vip 30d"

  vip_forever:
    category: "vip"
    title: "&6VIP навсегда"
    description:
      - "&7Постоянная VIP-привилегия."
    material: "NETHERITE_INGOT"
    slot: 11
    price: 1499
    duration-days: 0
    enabled: true
    grant-commands:
      - "lp user {player_name} parent add vip"

  kit_start:
    category: "kits"
    title: "&bСтартовый набор"
    description:
      - "&7Полезный набор для начала игры."
    material: "IRON_PICKAXE"
    slot: 10
    price: 149
    duration-days: 0
    enabled: true
    grant-commands:
      - "kit give start {player_name}"

  coins_5000:
    category: "currency"
    title: "&a5000 коинов"
    description:
      - "&7Пополнение баланса сервера на 5000 коинов."
    material: "SUNFLOWER"
    slot: 10
    price: 199
    duration-days: 0
    enabled: true
    grant-commands:
      - "eco give {player_name} 5000"
