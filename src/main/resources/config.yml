settings:
  api-base-url: "http://localhost:4000"
  server-id: "your-server-id"
  private-key: "your-private-key"
  currency: "RUB"
  request-timeout-seconds: 8
  balance-cache-seconds: 5
  topup-quick-amounts: [100, 300, 500, 1000]
  reopen-main-menu-after-action: true
  require-purchase-confirmation: true
  announce-purchases-to-server: true
  purchase-announcement-template: "&6Игрок &f{player_name}&6 купил &f{item_name}&6 за &f{price} {currency}"

